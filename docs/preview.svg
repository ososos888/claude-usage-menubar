<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" font-family="-apple-system, 'SF Pro Text', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="desk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a6ea5"/>
      <stop offset="1" stop-color="#2b4d78"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- desktop backdrop -->
  <rect x="0" y="0" width="640" height="360" rx="12" fill="url(#desk)"/>

  <!-- menu bar strip -->
  <rect x="0" y="0" width="640" height="28" rx="12" fill="#ffffff" fill-opacity="0.82"/>
  <rect x="0" y="16" width="640" height="12" fill="#ffffff" fill-opacity="0.82"/>
  <!-- widget (highlighted, as if clicked) -->
  <rect x="404" y="3" width="150" height="22" rx="5" fill="#0a84ff"/>
  <text x="414" y="18" font-size="13" fill="#ffffff" font-weight="600">s14% · w25% · ⏳3h58m</text>
  <!-- fake system clock -->
  <text x="618" y="18" font-size="13" fill="#1d1d1f" text-anchor="end">Tue 2:42 PM</text>

  <!-- dropdown panel -->
  <g filter="url(#shadow)">
    <rect x="404" y="34" width="228" height="214" rx="10" fill="#ffffff"/>
  </g>

  <!-- info rows (disabled/gray) -->
  <text x="418" y="58" font-size="12.5" fill="#1d1d1f">Session: 14% used · 3h 58m left</text>
  <text x="418" y="80" font-size="12.5" fill="#1d1d1f">Weekly (all models): 25% used</text>
  <text x="418" y="96" font-size="12.5" fill="#86868b">· 4d 14h left</text>
  <text x="418" y="118" font-size="12.5" fill="#1d1d1f">Weekly (Fable): 0%</text>

  <line x1="414" y1="132" x2="622" y2="132" stroke="#e5e5e7" stroke-width="1"/>
  <text x="418" y="150" font-size="12" fill="#86868b">Updated: 2026-07-21T05:42:05Z</text>

  <!-- selected action row -->
  <rect x="410" y="160" width="216" height="20" rx="4" fill="#0a84ff"/>
  <text x="418" y="174" font-size="12.5" fill="#ffffff">Refresh now</text>
  <text x="622" y="174" font-size="12" fill="#ffffff" text-anchor="end" opacity="0.9">⌘R</text>

  <text x="418" y="196" font-size="12.5" fill="#1d1d1f">Open usage page</text>

  <line x1="414" y1="208" x2="622" y2="208" stroke="#e5e5e7" stroke-width="1"/>
  <text x="418" y="228" font-size="12.5" fill="#1d1d1f">Quit</text>
  <text x="622" y="228" font-size="12" fill="#86868b" text-anchor="end">⌘Q</text>

  <!-- caption -->
  <text x="20" y="330" font-size="13" fill="#ffffff" opacity="0.92" font-weight="600">Claude usage in the menu bar</text>
  <text x="20" y="348" font-size="11.5" fill="#ffffff" opacity="0.72">s = session (5-hour rolling) · w = weekly · ⏳ = time until session reset</text>
</svg>
